<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Watch</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #181b24;
    --card2: #1f2330;
    --text: #e8eaf0;
    --muted: #8b90a0;
    --accent: #4f8ef7;
    --green: #34c77b;
    --red: #e5534b;
    --amber: #e8a33d;
    --border: #2a2f3d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding-bottom: 60px;
  }
  header { padding: 24px 20px 12px; max-width: 1100px; margin: 0 auto; }
  header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
  main { max-width: 1100px; margin: 0 auto; padding: 0 16px; }

  .deals-banner {
    background: linear-gradient(135deg, #14351f, #10281a);
    border: 1px solid #1f5c36;
    border-radius: 14px;
    padding: 16px;
    margin: 16px 0;
  }
  .deals-banner h2 { font-size: 15px; color: var(--green); margin-bottom: 10px; }
  .deal-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-top: 1px solid #1f4630; gap: 10px;
  }
  .deal-row:first-of-type { border-top: none; }
  .deal-row a { color: var(--green); font-weight: 600; text-decoration: none; white-space: nowrap; }
  .deal-name { font-size: 14px; }
  .deal-src { color: var(--muted); font-size: 12px; }

  .group {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    margin: 22px 0;
    overflow: hidden;
    transition: opacity 0.15s;
  }
  .group.dragging { opacity: 0.4; }
  .group.drag-over { border-color: var(--accent); }
  .group-head {
    padding: 14px 14px 12px 18px;
    display: flex; align-items: center; gap: 10px;
    cursor: grab; user-select: none;
  }
  .group-head:active { cursor: grabbing; }
  .group-title {
    font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); font-weight: 700; flex: 1;
  }
  .group-hint { font-size: 11px; color: var(--muted); }
  .gbtn {
    background: var(--card2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; width: 28px; height: 28px; font-size: 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .gbtn:hover { color: var(--text); border-color: #3a4152; }
  .gbtn.tog {
    background: transparent; border: none; font-size: 18px;
    width: 24px; height: 24px; margin-right: 2px; color: var(--muted);
  }
  .gbtn.tog:hover { color: var(--text); }
  .chev { display: inline-block; transition: transform 0.2s; }
  .group.collapsed .chev { transform: rotate(-90deg); }
  .group-body { }
  .group.collapsed .group-body { display: none; }
  .chart-wrap { padding: 0 16px 4px; height: 280px; }

  .legend {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 12px;
    padding: 14px 16px 16px;
  }
  .lg-card {
    display: flex; gap: 12px; align-items: center;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px;
    cursor: pointer;
    transition: opacity 0.15s, border-color 0.15s;
    position: relative;
  }
  .lg-card:hover { border-color: #3a4152; }
  .lg-card.off { opacity: 0.35; }
  .lg-thumb-wrap { position: relative; flex-shrink: 0; }
  .lg-thumb {
    width: 72px; height: 72px; border-radius: 10px;
    background: var(--bg); object-fit: contain; padding: 4px; display: block;
  }
  .lg-thumb-ph {
    width: 72px; height: 72px; border-radius: 10px; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; color: var(--muted);
  }
  .lg-line {
    position: absolute; left: 6px; right: 6px; bottom: -3px; height: 6px;
    border-radius: 3px;
    box-shadow: 0 0 8px 0 currentColor;
    background: currentColor;
  }
  .lg-info { min-width: 0; flex: 1; }
  .lg-name { font-size: 13px; font-weight: 600; line-height: 1.25; display: flex; align-items: center; gap: 6px; }
  .lg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
  .lg-price { font-size: 18px; font-weight: 700; margin-top: 3px; }
  .lg-price.below { color: var(--green); }
  .lg-meta { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
  .lg-meta b { color: var(--amber); font-weight: 600; }
  .lg-meta a { color: var(--accent); text-decoration: none; }
  .badge {
    display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
    padding: 2px 7px; border-radius: 20px; margin-top: 4px;
  }
  .badge.hit { background: #14351f; color: var(--green); border: 1px solid #1f5c36; }
  .badge.low { background: #33270f; color: var(--amber); border: 1px solid #5c471f; }

  .empty {
    text-align: center; padding: 70px 24px; color: var(--muted);
    background: var(--card); border: 1px dashed var(--border); border-radius: 16px; margin-top: 24px;
  }
  .empty h2 { color: var(--text); font-size: 18px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.7; max-width: 460px; margin: 0 auto; }
  .empty code { background: var(--card2); padding: 2px 8px; border-radius: 6px; color: var(--amber); font-size: 13px; }
  footer { text-align: center; color: var(--muted); font-size: 11px; margin-top: 40px; padding: 0 20px; }
</style>
</head>
<body>
<header>
  <h1>Price <span>Watch</span></h1>
  <div class="sub" id="updated">Loading…</div>
</header>
<main>
  <div id="deals"></div>
  <div id="content"></div>
</main>
<footer>Add items: text yourself “WATCH: item name, target $X”. Tap a legend card to hide/show its line. Drag a section header (or use ▲▼) to rearrange; tap the chevron to collapse.</footer>

<script>
const PALETTE = ["#4f8ef7", "#e8a33d", "#34c77b", "#e5534b", "#a78bfa", "#22d3ee", "#f472b6", "#facc15"];
const MAX_PER_CHART = 8;
const fmt = n => n == null ? "—" : "$" + n.toLocaleString("en-US", {minimumFractionDigits: 2, maximumFractionDigits: 2});

let WL = null, HIST = null, charts = [];

const store = {
  get(k, fb) { try { return JSON.parse(localStorage.getItem(k)) ?? fb; } catch { return fb; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

function dailyBest(day) {
  const all = [...(day.prices || []), ...(day.deals || [])].filter(p => p.price != null);
  if (!all.length) return null;
  return all.reduce((a, b) => a.price <= b.price ? a : b);
}

function orderedSections() {
  // Base groups in watchlist order
  const groups = {};
  for (const item of WL.items) {
    const g = item.group || "Other";
    (groups[g] = groups[g] || []).push(item);
  }
  // Apply saved order
  const saved = store.get("pw-group-order", []);
  const names = Object.keys(groups);
  names.sort((a, b) => {
    const ia = saved.indexOf(a), ib = saved.indexOf(b);
    if (ia === -1 && ib === -1) return 0;
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });
  // Split into chunks of MAX_PER_CHART
  const sections = [];
  for (const g of names) {
    const items = groups[g];
    const nChunks = Math.ceil(items.length / MAX_PER_CHART);
    for (let c = 0; c < nChunks; c++) {
      sections.push({
        group: g,
        title: nChunks > 1 ? `${g} ${c + 1}` : g,
        key: `${g}#${c}`,
        items: items.slice(c * MAX_PER_CHART, (c + 1) * MAX_PER_CHART)
      });
    }
  }
  return {names, sections};
}

function moveGroup(g, dir) {
  const {names} = orderedSections();
  const i = names.indexOf(g);
  const j = i + dir;
  if (j < 0 || j >= names.length) return;
  [names[i], names[j]] = [names[j], names[i]];
  store.set("pw-group-order", names);
  render();
}

function dropGroup(dragged, target) {
  if (dragged === target) return;
  const {names} = orderedSections();
  const arr = names.filter(n => n !== dragged);
  arr.splice(arr.indexOf(target), 0, dragged);
  store.set("pw-group-order", arr);
  render();
}

function render() {
  charts.forEach(c => c.destroy());
  charts = [];
  const content = document.getElementById("content");
  content.innerHTML = "";

  const seriesOf = {};
  for (const item of WL.items) {
    seriesOf[item.id] = (HIST[item.id] || [])
      .map(d => ({date: d.date, best: dailyBest(d)}))
      .filter(d => d.best);
  }

  // Deals banner
  const dealHits = [];
  for (const item of WL.items) {
    const s = seriesOf[item.id];
    if (!s.length) continue;
    const best = s[s.length - 1].best;
    if (item.targetPrice != null && best.price <= item.targetPrice) dealHits.push({item, best});
  }
  document.getElementById("deals").innerHTML = dealHits.length ? `
    <div class="deals-banner">
      <h2>🎯 At or below target</h2>
      ${dealHits.map(d => `
        <div class="deal-row">
          <div>
            <div class="deal-name">${d.item.name}</div>
            <div class="deal-src">${d.best.source}${d.best.note ? " · " + d.best.note : ""}</div>
          </div>
          <a href="${d.best.url || "#"}" target="_blank">${fmt(d.best.price)} →</a>
        </div>`).join("")}
    </div>` : "";

  const collapsed = new Set(store.get("pw-collapsed", []));
  const {sections} = orderedSections();

  for (const sec of sections) {
    const section = document.createElement("div");
    section.className = "group" + (collapsed.has(sec.key) ? " collapsed" : "");
    section.dataset.group = sec.group;
    content.appendChild(section);

    section.innerHTML = `
      <div class="group-head">
        <button class="gbtn tog" title="Collapse/expand"><span class="chev">▾</span></button>
        <div class="group-title">${sec.title}</div>
        <div class="group-hint">${sec.items.length} item${sec.items.length === 1 ? "" : "s"}</div>
        <button class="gbtn up" title="Move up">▲</button>
        <button class="gbtn down" title="Move down">▼</button>
      </div>
      <div class="group-body">
        <div class="chart-wrap"><canvas></canvas></div>
        <div class="legend"></div>
      </div>`;

    // Collapse
    const toggle = () => {
      section.classList.toggle("collapsed");
      const c = new Set(store.get("pw-collapsed", []));
      section.classList.contains("collapsed") ? c.add(sec.key) : c.delete(sec.key);
      store.set("pw-collapsed", [...c]);
    };
    section.querySelector(".tog").addEventListener("click", e => { e.stopPropagation(); toggle(); });
    section.querySelector(".group-head").addEventListener("dblclick", toggle);

    // Reorder buttons (act on whole base group)
    section.querySelector(".up").addEventListener("click", e => { e.stopPropagation(); moveGroup(sec.group, -1); });
    section.querySelector(".down").addEventListener("click", e => { e.stopPropagation(); moveGroup(sec.group, 1); });

    // Drag & drop (desktop)
    const head = section.querySelector(".group-head");
    head.draggable = true;
    head.addEventListener("dragstart", e => {
      e.dataTransfer.setData("text/plain", sec.group);
      section.classList.add("dragging");
    });
    head.addEventListener("dragend", () => section.classList.remove("dragging"));
    section.addEventListener("dragover", e => { e.preventDefault(); section.classList.add("drag-over"); });
    section.addEventListener("dragleave", () => section.classList.remove("drag-over"));
    section.addEventListener("drop", e => {
      e.preventDefault();
      section.classList.remove("drag-over");
      dropGroup(e.dataTransfer.getData("text/plain"), sec.group);
    });

    // Shared x-axis dates for this chart
    const dateSet = new Set();
    sec.items.forEach(it => seriesOf[it.id].forEach(d => dateSet.add(d.date)));
    const dates = [...dateSet].sort();

    const datasets = sec.items.map((item, i) => {
      const color = PALETTE[i % PALETTE.length];
      const byDate = Object.fromEntries(seriesOf[item.id].map(d => [d.date, d.best.price]));
      return {
        label: item.name,
        data: dates.map(dt => byDate[dt] ?? null),
        borderColor: color,
        backgroundColor: color + "22",
        pointBackgroundColor: color,
        spanGaps: true,
        tension: 0.3,
        pointRadius: dates.length > 30 ? 0 : 3.5,
        borderWidth: 2.5,
        fill: false
      };
    });

    const chart = new Chart(section.querySelector("canvas").getContext("2d"), {
      type: "line",
      data: {labels: dates.map(d => d.slice(5)), datasets},
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: {mode: "nearest", intersect: false},
        plugins: {
          legend: {display: false},
          tooltip: {callbacks: {label: c => c.dataset.label + ": " + fmt(c.parsed.y)}}
        },
        scales: {
          x: {ticks: {color: "#8b90a0", maxTicksLimit: 8, font: {size: 10}}, grid: {display: false}},
          y: {ticks: {color: "#8b90a0", font: {size: 10}, callback: v => "$" + v}, grid: {color: "#2a2f3d"}}
        }
      }
    });
    charts.push(chart);

    // Oversized legend
    const legend = section.querySelector(".legend");
    sec.items.forEach((item, i) => {
      const color = PALETTE[i % PALETTE.length];
      const s = seriesOf[item.id];
      const cur = s.length ? s[s.length - 1].best : null;
      const pricesArr = s.map(d => d.best.price);
      const min = pricesArr.length ? Math.min(...pricesArr) : null;
      const avg = pricesArr.length ? pricesArr.reduce((a, b) => a + b, 0) / pricesArr.length : null;
      const belowTarget = cur && item.targetPrice != null && cur.price <= item.targetPrice;
      const atLow = cur && min != null && cur.price <= min && pricesArr.length > 1;

      const card = document.createElement("div");
      card.className = "lg-card";
      card.innerHTML = `
        <div class="lg-thumb-wrap" style="color:${color}">
          ${item.image
            ? `<img class="lg-thumb" src="${item.image}" alt="" onerror="this.outerHTML='<div class=lg-thumb-ph>📦</div>'">`
            : `<div class="lg-thumb-ph">📦</div>`}
          <div class="lg-line"></div>
        </div>
        <div class="lg-info">
          <div class="lg-name"><span class="lg-dot" style="background:${color}"></span>${item.name}</div>
          <div class="lg-price ${belowTarget ? "below" : ""}">${cur ? fmt(cur.price) : "—"}</div>
          <div class="lg-meta">
            ${item.targetPrice != null ? `target <b>${fmt(item.targetPrice)}</b> · ` : ""}low ${fmt(min)} · avg ${fmt(avg)}
            ${cur && cur.url ? ` · <a href="${cur.url}" target="_blank" onclick="event.stopPropagation()">view →</a>` : ""}
          </div>
          ${belowTarget ? `<span class="badge hit">BELOW TARGET</span>` : atLow ? `<span class="badge low">ALL-TIME LOW</span>` : ""}
        </div>`;
      card.addEventListener("click", () => {
        const vis = chart.isDatasetVisible(i);
        chart.setDatasetVisibility(i, !vis);
        chart.update();
        card.classList.toggle("off", vis);
      });
      legend.appendChild(card);
    });
  }
}

async function load() {
  const bust = "?t=" + Date.now();
  [WL, HIST] = await Promise.all([
    fetch("data/watchlist.json" + bust).then(r => r.json()),
    fetch("data/history.json" + bust).then(r => r.json())
  ]);
  document.getElementById("updated").textContent =
    "Last updated " + (WL.updated || "never") + " · " + WL.items.length + " item" + (WL.items.length === 1 ? "" : "s") + " tracked";

  if (!WL.items.length) {
    document.getElementById("content").innerHTML = `
      <div class="empty">
        <h2>Nothing tracked yet</h2>
        <p>Text yourself <code>WATCH: item name, target $X</code> in Messages,
        or tell Claude to add an item. New items appear after the next daily price check (7am).</p>
      </div>`;
    return;
  }
  render();
}
load().catch(e => {
  document.getElementById("content").innerHTML = `<div class="empty"><h2>Couldn't load data</h2><p>${e}</p></div>`;
});
</script>
</body>
</html>
